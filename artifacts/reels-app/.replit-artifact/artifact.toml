kind = "web"
previewPath = "/"
title = "Reels Platform"
version = "1.0.0"
id = "artifacts/reels-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20184

[services.development]
run = "pnpm --filter @workspace/reels-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reels-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/reels-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20184"
BASE_PATH = "/"
